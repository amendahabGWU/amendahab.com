<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | AMEN</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600&family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f2f2ee;
      --ink: #0f0f0f;
      --muted: #5f5f5f;
      --accent: #0000ff;
    }
    * { box-sizing: border-box; margin: 0; }
    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
    }
    body {
      font: 400 14px/1.35 "Archivo", "Avenir Next", "Trebuchet MS", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font: 400 3rem/1 "Archivo Black", "Arial Black", sans-serif;
      letter-spacing: 0.02em;
      margin-bottom: 0.6rem;
    }
    p {
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.82rem;
      margin-bottom: 1.6rem;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.72rem;
      text-transform: lowercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid transparent;
      transition: border-color 160ms ease;
    }
    a:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>nothing here but wind.</p>
  <a href="/">back to amen</a>
</body>
</html>
